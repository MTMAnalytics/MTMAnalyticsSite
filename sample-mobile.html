<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Sample Report — MTM Analytics (Mobile)</title>

  <style>
    :root{
      --bg-dark:#02102a;
      --bg-mid:#042a66;
      --neon: rgba(64,200,255,0.98);
    }

    *{box-sizing:border-box;margin:0;padding:0;}

    html,body{
      height:100%;
      width:100%;
      overflow:hidden;
      background:
        url('assets/bg-texture.jpg'),
        radial-gradient(1200px 600px at 10% 10%, rgba(64,200,255,0.03), transparent 8%),
        linear-gradient(180deg, rgba(0,8,24,0.72), rgba(2,12,36,0.6));
      background-size:cover;
      background-position:center;
      font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
      color:#eaf6ff;
    }

    .grain {
      position:fixed;
      inset:0;
      background-image: radial-gradient(rgba(255,255,255,0.01) 1px, transparent 1px);
      background-size: 3px 3px;
      mix-blend-mode: overlay;
      opacity:0.25;
      pointer-events:none;
      z-index:1;
    }

    /* PORTRAIT ROTATION MESSAGE */
    .rotate-message{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:40px;
      font-size:1.4rem;
      font-weight:600;
      color:var(--neon);
      backdrop-filter: blur(8px);
      z-index:50;
    }

    /* LANDSCAPE REPORT */
    .report-wrapper{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      overflow:hidden;
      display:none; /* hidden in portrait */
      z-index:5;
    }

    iframe{
      width:100%;
      height:100%;
      border:0;
    }

    .mask-bottom{
      position:absolute;
      bottom:0;
      left:0;
      width:100%;
      height:90px;
      background:linear-gradient(to bottom, rgba(2,12,36,0) 0%, rgba(2,12,36,1) 100%);
      pointer-events:none;
      z-index:10;
    }

    .mask-top-right{
      position:absolute;
      top:0;
      right:0;
      width:160px;
      height:120px;
      background:transparent;
      pointer-events:none;
      z-index:10;
    }

    .back-btn{
      position:fixed;
      bottom:16px;
      left:16px;
      padding:12px 20px;
      background: linear-gradient(90deg, rgba(64,200,255,0.22), rgba(64,200,255,0.12));
      color:var(--neon);
      border-radius:999px;
      font-weight:700;
      text-decoration:none;
      border:1px solid rgba(64,200,255,0.22);
      backdrop-filter: blur(12px) saturate(160%);
      box-shadow:0 8px 30px rgba(0,0,0,0.45);
      z-index:20;
      font-size:1rem;
      display:none; /* hidden in portrait */
    }
  </style>

  <script>
    function updateOrientation(){
      const isLandscape = window.innerWidth > window.innerHeight;

      document.querySelector('.rotate-message').style.display = isLandscape ? 'none' : 'flex';
      document.querySelector('.report-wrapper').style.display = isLandscape ? 'block' : 'none';
      document.querySelector('.back-btn').style.display = isLandscape ? 'block' : 'none';
    }

    window.addEventListener('resize', updateOrientation);
    window.addEventListener('orientationchange', updateOrientation);
    window.addEventListener('load', updateOrientation);
  </script>

</head>

<body>

  <div class="grain"></div>

  <!-- PORTRAIT MESSAGE -->
  <div class="rotate-message">
    Please rotate your device to landscape to view this report.
  </div>

  <!-- BACK BUTTON -->
  <a href="https://mtmanalytics.co.uk" class="back-btn">← Back</a>

  <!-- LANDSCAPE REPORT -->
  <div class="report-wrapper">
    <iframe
      title="Sample Report"
     src="https://app.powerbi.com/view?r=eyJrIjoiZDNjMmE2NGMtYTNlNy00NGFiLTgxZWItNzA3YWY5ZjJhZjM1IiwidCI6ImY5ZTg2ZWIyLTFhODQtNGNlZC05YjI0LTIzMzVhNmI0M2Y1OCJ9"
      allowfullscreen="true">
    </iframe>

    <div class="mask-bottom"></div>
    <div class="mask-top-right"></div>
  </div>

</body>
</html>
