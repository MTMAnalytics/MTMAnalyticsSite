<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MTM Analytics</title>
  <meta name="description" content="MTM Analytics — reports coming soon" />

  <style>
    :root{
      --bg-dark:#03102a;
      --bg-mid:#042a5a;
      --glass-1: rgba(255,255,255,0.04);
      --glass-2: rgba(255,255,255,0.02);
      --neon: rgba(64,200,255,0.95);
      --muted: rgba(230,240,251,0.75);
      --card-blue: rgba(10,36,80,0.55);
      --radius: 16px;
      --ease: cubic-bezier(.2,.9,.3,1);
    }

    /* Reset */
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      color: #eaf6ff;
      background:
        radial-gradient(800px 400px at 10% 10%, rgba(64,200,255,0.04), transparent 8%),
        radial-gradient(700px 350px at 90% 80%, rgba(10,120,255,0.03), transparent 6%),
        linear-gradient(180deg, var(--bg-dark), var(--bg-mid));
      display:flex;
      align-items:flex-start;
      justify-content:center;
      min-height:100vh;
      padding:48px 20px;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      overflow-x:hidden;
    }

    /* Subtle animated background glow */
    .glow {
      position:fixed;
      inset: -10% -10% auto auto;
      width:70vmax;
      height:70vmax;
      background: radial-gradient(circle at 30% 30%, rgba(64,200,255,0.06), transparent 20%),
                  radial-gradient(circle at 80% 80%, rgba(10,120,255,0.04), transparent 10%);
      filter: blur(80px) saturate(120%);
      pointer-events:none;
      z-index:0;
      transform: translateZ(0);
    }

    /* Intro splash (centered logo) */
    .intro {
      position:fixed;
      inset:0;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding-top:6vh;
      background: linear-gradient(180deg, rgba(2,6,18,0.55), rgba(2,6,18,0.12));
      z-index:40;
      transition: opacity 900ms var(--ease), visibility 900ms var(--ease);
    }
    .intro.hidden{ opacity:0; visibility:hidden; pointer-events:none; }
    .intro img{
      width:18vmin;
      max-width:160px;
      height:auto;
      display:block;
      transform-origin:center;
      animation: introPop 900ms var(--ease) forwards;
      filter: drop-shadow(0 8px 30px rgba(0,0,0,0.6));
    }
    @keyframes introPop{
      0%{transform: scale(.6); opacity:0}
      60%{transform: scale(1.08); opacity:1}
      100%{transform: scale(1); opacity:1}
    }

    /* Page container */
    .container{
      width:100%;
      max-width:980px;
      z-index:10;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:28px;
    }

    /* Top centered logo (small) */
    .top-logo {
      margin-top:8vh;
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      pointer-events:none;
    }
    .top-logo img{
      height:48px;
      width:auto;
      display:block;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.6));
      transition: transform 600ms var(--ease), opacity 600ms var(--ease);
    }

    /* Main card */
    .card {
      width:100%;
      max-width:720px;
      margin-top:18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius: var(--radius);
      padding:28px;
      box-shadow:
        0 10px 40px rgba(2,6,23,0.6),
        0 0 40px rgba(64,200,255,0.06);
      backdrop-filter: blur(12px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.03);
      display:flex;
      gap:20px;
      align-items:center;
      position:relative;
      z-index:5;
      transition: transform 600ms var(--ease), box-shadow 400ms var(--ease);
    }

    /* Neon rim to make it pop */
    .card::before{
      content:"";
      position:absolute;
      inset:-2px;
      border-radius:calc(var(--radius) + 2px);
      background: linear-gradient(90deg, transparent, rgba(64,200,255,0.06), transparent);
      filter: blur(18px);
      z-index:-1;
      pointer-events:none;
      mix-blend-mode:screen;
    }

    .preview {
      width:180px;
      height:120px;
      border-radius:12px;
      background: linear-gradient(135deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow: 0 6px 20px rgba(2,6,23,0.5), 0 0 18px rgba(64,200,255,0.06) inset;
    }
    .preview img{ max-width:88%; max-height:88%; opacity:0.98; }

    .meta {
      flex:1;
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:flex-start;
    }
    .meta h2{
      margin:0;
      font-size:1.15rem;
      letter-spacing:-0.02em;
      color: #eaf6ff;
    }
    .meta p{
      margin:0;
      color:var(--muted);
      font-size:0.95rem;
      line-height:1.35;
    }

    .cta {
      margin-top:6px;
      display:flex;
      gap:12px;
      align-items:center;
    }
    .btn {
      appearance:none;
      border:0;
      background: linear-gradient(90deg, rgba(64,200,255,0.14), rgba(64,200,255,0.08));
      color:var(--neon);
      padding:10px 16px;
      border-radius:999px;
      font-weight:700;
      letter-spacing:0.02em;
      cursor:pointer;
      box-shadow: 0 6px 30px rgba(64,200,255,0.08);
      transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
    }
    .btn:active{ transform: translateY(1px) scale(.998) }
    .btn.secondary{
      background: transparent;
      color:var(--muted);
      border: 1px solid rgba(255,255,255,0.03);
      box-shadow:none;
    }

    /* Small screens */
    @media (max-width:720px){
      body{ padding:28px 16px; }
      .intro img{ width:34vmin; max-width:140px; }
      .top-logo img{ height:40px; }
      .card{ flex-direction:column; align-items:center; padding:20px; gap:16px; }
      .preview{ width:100%; height:160px; }
      .meta{ align-items:center; text-align:center; }
    }
  </style>
</head>
<body>

  <div class="glow" aria-hidden="true"></div>

  <!-- Intro splash: centered logo for ~3s then fades -->
  <div id="intro" class="intro" role="dialog" aria-label="Intro animation">
    <img src="assets/logo.png" alt="MTM Analytics logo" id="introLogo">
  </div>

  <div class="container" role="main" aria-labelledby="siteTitle">
    <!-- Top centered small logo (stays visible after intro) -->
    <div class="top-logo" aria-hidden="false">
      <img src="assets/logo.png" alt="MTM Analytics" id="topLogo">
    </div>

    <!-- Main card with logo placeholder and coming soon CTA -->
    <section class="card" aria-labelledby="cardTitle" aria-describedby="cardDesc">
      <div class="preview" aria-hidden="true">
        <!-- temporary logo placement -->
        <img src="assets/logo.png" alt="Logo placeholder">
      </div>

      <div class="meta">
        <h2 id="cardTitle">Report Dashboard</h2>
        <p id="cardDesc">Interactive reports will be embedded here. For now, this is a placeholder card.</p>

        <div class="cta" role="group" aria-label="Actions">
          <button class="btn" aria-disabled="true">Coming soon</button>
          <button class="btn secondary" onclick="alert('Placeholder — link will be added later')">Placeholder</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    (function(){
      const intro = document.getElementById('intro');
      const topLogo = document.getElementById('topLogo');

      // Show intro for ~3000ms then fade out smoothly
      const SHOW_MS = 3000;
      const FADE_MS = 900;

      // After SHOW_MS, fade intro and slightly animate top logo
      setTimeout(() => {
        intro.classList.add('hidden');
        // subtle lift and settle for top logo
        topLogo.style.transform = 'translateY(-8px)';
        topLogo.style.opacity = '0.98';
        setTimeout(()=> topLogo.style.transform = 'translateY(0)', 600);
      }, SHOW_MS);

      // Accessibility: allow skipping animation with Escape or click
      window.addEventListener('keydown', (e) => {
        if(e.key === 'Escape'){
          intro.classList.add('hidden');
        }
      });
      intro.addEventListener('click', () => intro.classList.add('hidden'));
    })();
  </script>
</body>
</html>
