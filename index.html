<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MTM Analytics — Dashboard (Logo Morph Optimized)</title>
<style>
:root{
  --bg-very-dark:#00010a;
  --bg-deep:#00122a;
  --neon:#00d9ff;
  --card-surface: rgba(6,14,30,0.72);
  --card-border: rgba(20,40,80,0.12);
  --card-radius:14px;
  --ease:cubic-bezier(.2,.9,.3,1);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;-webkit-font-smoothing:antialiased}
body{
  display:flex;align-items:center;justify-content:center;min-height:100vh;padding:28px;
  background:linear-gradient(180deg,var(--bg-very-dark) 0%,var(--bg-deep) 100%);color:#eaf6ff;overflow:hidden;
}

/* Canvas stage */
#stage-wrap{position:fixed;inset:0;z-index:0;pointer-events:none}
canvas#stage{width:100%;height:100%;display:block}

/* UI layout */
.container{position:relative;z-index:10;width:100%;max-width:1100px;display:flex;flex-direction:column;align-items:center;gap:28px;padding:28px}
.intro{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:30;pointer-events:none}
.intro .logo-wrap{display:flex;align-items:center;justify-content:center;padding:6px;border-radius:10px;background:transparent}
.intro img{width:40vmin;max-width:640px;filter:drop-shadow(0 30px 80px rgba(0,0,0,0.85))}
.top-logo{display:flex;align-items:center;justify-content:center;width:100%;opacity:0;transform:translateY(-6px) scale(0.98);transition:opacity 420ms var(--ease),transform 420ms var(--ease);z-index:12}
.top-logo.visible{opacity:1;transform:translateY(0) scale(1)}
.layout-row{display:flex;gap:36px;align-items:center;justify-content:center;width:100%;max-width:1200px;z-index:10}
.left-slot,.center-slot,.right-slot{display:flex;align-items:center;justify-content:center}
.center-slot{flex:0 1 520px;flex-direction:column;gap:28px}

/* Cards: darker glass with soft neon halo */
.card{position:relative;width:100%;max-width:520px;border-radius:var(--card-radius);padding:22px;background-color:var(--card-surface);border:1px solid var(--card-border);backdrop-filter: blur(10px) saturate(120%);box-shadow:0 40px 90px rgba(0,6,18,0.72), 0 0 40px rgba(0,217,255,0.04);display:flex;flex-direction:column;gap:16px;align-items:center;opacity:0;transform:translateY(14px) scale(0.995);transition:transform 420ms var(--ease),opacity 420ms var(--ease)}
.card.visible{opacity:1;transform:translateY(0) scale(1.006)}
.card::before{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:calc(100% + 40px);height:calc(100% + 40px);border-radius:inherit;z-index:-1;box-shadow:0 30px 80px rgba(0,217,255,0.06);pointer-events:none}
.preview{width:240px;height:160px;border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid rgba(255,255,255,0.02);background:linear-gradient(135deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005))}
.coming-link{display:inline-block;padding:12px 22px;border-radius:999px;background:linear-gradient(90deg, rgba(0,212,255,0.12), rgba(10,180,220,0.06));color:var(--neon);font-weight:800;border:1px solid rgba(0,180,220,0.12);text-decoration:none;transition:transform 160ms var(--ease),box-shadow 160ms var(--ease)}
footer.site-footer{margin-top:40px;text-align:center;color:rgba(200,220,235,0.55);font-size:0.85rem;position:fixed;left:0;right:0;bottom:12px;opacity:0;transform:translateY(8px);transition:opacity 320ms var(--ease),transform 320ms var(--ease);pointer-events:none;z-index:12}
footer.site-footer.visible{opacity:1;transform:translateY(0);pointer-events:auto}
@media (max-width:1100px){.layout-row{flex-direction:column;gap:20px}}
</style>
</head>
<body>

<div id="stage-wrap"><canvas id="stage"></canvas></div>

<div class="intro" id="intro">
  <div class="logo-wrap"><img id="introLogo" src="assets/logo.png" alt="MTM Analytics logo"></div>
</div>

<div class="container" role="main" aria-live="polite">
  <div class="top-logo" id="topLogoWrap"><img id="topLogo" src="assets/logo.png" alt="MTM Analytics"></div>

  <div class="layout-row">
    <div class="left-slot" id="leftSlot" style="width:260px;height:260px;"></div>

    <div class="center-slot">
      <section class="card" id="sampleCard">
        <div class="preview"><img src="assets/logo.png" alt="MTM Analytics sample"></div>
        <a class="coming-link" href="sample.html">Sample Report</a>
      </section>

      <section class="card" id="mainCard" style="max-width:520px;">
        <div class="preview"><img src="assets/IPA-Blue.png" alt="IPA Dashboard"></div>
        <a class="coming-link" href="#">IPA</a>
      </section>
    </div>

    <div class="right-slot" id="rightSlot" style="width:260px;height:260px;"></div>
  </div>

  <footer id="site-footer" class="site-footer">© 2026 MTM Analytics. All rights reserved.</footer>
</div>

<script>
/*
  Clear, performant logo morph:
  - Small dedicated group of particles (LOGO_PARTICLES) form the logo in left slot.
  - Background particles (BG_PARTICLES) are lightweight and remain subtle.
  - Spatial hash used for line drawing only on background group (cheap).
  - Higher sampling density for logo to make the silhouette crisp.
*/

/* ---------- CONFIG ---------- */
const logoPath = 'assets/logo.png'; // ensure this file is in same folder structure
const MAX_DPR = 1.5;
const LOGO_PARTICLES = 220;   // particles dedicated to forming the logo (increase for more detail)
const BG_PARTICLES = 120;     // background particles (keep low for performance)
const BASE_SPEED = window.innerWidth < 768 ? 0.10 : 0.28;
const DOT_MIN = 0.9, DOT_MAX = 2.4;
const LINE_DIST = 80;
const GRID_CELL = LINE_DIST;

/* ---------- CANVAS SETUP ---------- */
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d', { alpha: true });
function setSize(){
  const dpr = Math.min(MAX_DPR, window.devicePixelRatio || 1);
  canvas._dpr = dpr;
  canvas.width = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
setSize();
window.addEventListener('resize', ()=>{ clearTimeout(window._rt); window._rt = setTimeout(()=>{ setSize(); initAll(); }, 140); });

/* ---------- PARTICLES ---------- */
let logoParticles = [];
let bgParticles = [];
function rand(a,b){ return Math.random()*(b-a)+a; }

function initAll(){
  logoParticles = [];
  bgParticles = [];
  // logo particles start scattered near left slot area for clarity
  const leftRect = document.getElementById('leftSlot').getBoundingClientRect();
  const leftCx = leftRect.left + leftRect.width/2;
  const leftCy = leftRect.top + leftRect.height/2;
  for (let i=0;i<LOGO_PARTICLES;i++){
    logoParticles.push({
      x: leftCx + (Math.random()-0.5) * leftRect.width * 1.6,
      y: leftCy + (Math.random()-0.5) * leftRect.height * 1.6,
      vx: (Math.random()-0.5)*BASE_SPEED,
      vy: (Math.random()-0.5)*BASE_SPEED,
      r: rand(DOT_MIN, DOT_MAX),
      alpha: rand(0.28,0.9),
      tx: null, ty: null
    });
  }
  // background particles cover whole screen but are cheap
  for (let i=0;i<BG_PARTICLES;i++){
    bgParticles.push({
      x: Math.random()*innerWidth,
      y: Math.random()*innerHeight,
      vx: (Math.random()-0.5)*BASE_SPEED*0.6,
      vy: (Math.random()-0.5)*BASE_SPEED*0.6,
      r: rand(0.8,1.8),
      alpha: rand(0.12,0.36)
    });
  }
}

/* ---------- LOGO SAMPLING ---------- */
const logoImg = new Image();
logoImg.src = logoPath;
const off = document.createElement('canvas');
const offCtx = off.getContext('2d');

function sampleLogoPoints(maxPoints, box){
  // box: {cx, cy, maxW}
  if (!logoImg.width || !logoImg.height) return sampleTextPoints(maxPoints, 'MTM', box);
  const maxW = Math.min(box.maxW || Math.floor(innerWidth * 0.36), Math.floor(innerWidth * 0.5));
  const scale = maxW / logoImg.width;
  const w = Math.max(120, Math.floor(logoImg.width * scale)); // larger min width for detail
  const h = Math.max(60, Math.floor(logoImg.height * scale));
  off.width = w; off.height = h;
  offCtx.clearRect(0,0,w,h);
  try { offCtx.drawImage(logoImg, 0, 0, w, h); } catch(e){ return sampleTextPoints(maxPoints, 'MTM', box); }
  const data = offCtx.getImageData(0,0,w,h).data;
  const pts = [];
  // denser sampling for clarity
  const step = Math.max(1, Math.floor(Math.sqrt((w*h)/maxPoints)));
  for (let y=0;y<h;y+=step){
    for (let x=0;x<w;x+=step){
      const idx = (y*w + x) * 4;
      if (data[idx+3] > 60){
        pts.push({ x: (box.cx - w/2) + x, y: (box.cy - h/2) + y });
      }
    }
  }
  if (pts.length < 8) return sampleTextPoints(maxPoints, 'MTM', box);
  shuffle(pts);
  return pts.slice(0, Math.max(10, Math.floor(maxPoints)));
}

function sampleTextPoints(maxPoints, text, box){
  const w = Math.min(box.maxW || Math.floor(innerWidth * 0.36), Math.floor(innerWidth * 0.5));
  const h = Math.max(80, Math.floor(w * 0.28));
  off.width = w; off.height = h;
  offCtx.clearRect(0,0,w,h);
  offCtx.fillStyle = 'white';
  offCtx.textBaseline = 'middle';
  offCtx.textAlign = 'center';
  const fontSize = Math.floor(h * 0.7);
  offCtx.font = `bold ${fontSize}px Inter, Arial, sans-serif`;
  offCtx.fillText(text, w/2, h/2);
  const data = offCtx.getImageData(0,0,w,h).data;
  const pts = [];
  const step = Math.max(1, Math.floor(Math.sqrt((w*h)/maxPoints)));
  for (let y=0;y<h;y+=step){
    for (let x=0;x<w;x+=step){
      const idx = (y*w + x) * 4;
      if (data[idx+3] > 60){
        pts.push({ x: (box.cx - w/2) + x, y: (box.cy - h/2) + y });
      }
    }
  }
  shuffle(pts);
  return pts.slice(0, Math.max(10, Math.floor(maxPoints)));
}

/* ---------- 8-ball generator (right slot) ---------- */
function generate8BallPoints(maxPoints, box){
  const cx = box.cx, cy = box.cy;
  const R = Math.min(box.maxW, Math.min(innerWidth, innerHeight) * 0.14);
  const pts = [];
  const ringCount = Math.floor(maxPoints * 0.6);
  for (let i=0;i<ringCount;i++){
    const t = i / ringCount * Math.PI * 2;
    const r = R * (0.86 + 0.14 * Math.random());
    pts.push({x: cx + Math.cos(t)*r, y: cy + Math.sin(t)*r});
  }
  const smallCount = Math.floor(maxPoints * 0.25);
  const rSmall = R * 0.36;
  const top = {x:cx, y:cy - rSmall*0.6};
  const bot = {x:cx, y:cy + rSmall*0.6};
  for (let i=0;i<smallCount;i++){
    const a = Math.random()*Math.PI*2;
    const rad = rSmall * (0.2 + Math.random()*0.8);
    pts.push({x: top.x + Math.cos(a)*rad*0.6, y: top.y + Math.sin(a)*rad*0.6});
    pts.push({x: bot.x + Math.cos(a)*rad*0.6, y: bot.y + Math.sin(a)*rad*0.6});
  }
  shuffle(pts);
  return pts.slice(0, Math.max(10, Math.floor(maxPoints)));
}

/* ---------- Helpers ---------- */
function shuffle(a){ for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } }
function wait(ms){ return new Promise(r => setTimeout(r, ms)); }

/* ---------- Assign targets and tweens ---------- */
function assignLogoTargets(pts){
  for (let i=0;i<logoParticles.length;i++){
    const p = logoParticles[i];
    const pt = pts[i % pts.length];
    p.tx = pt.x + (Math.random()-0.5)*0.8;
    p.ty = pt.y + (Math.random()-0.5)*0.8;
  }
}
function assign8BallTargets(pts){
  for (let i=0;i<logoParticles.length;i++){
    // map a subset of logoParticles to 8-ball for a quick morph (keeps counts manageable)
    const p = logoParticles[i];
    const pt = pts[i % pts.length];
    p.tx = pt.x + (Math.random()-0.5)*0.8;
    p.ty = pt.y + (Math.random()-0.5)*0.8;
  }
}
function clearLogoTargets(){ for (let p of logoParticles){ p.tx = null; p.ty = null; } }

/* ---------- Draw loop (lightweight) ---------- */
let last = performance.now();
function draw(now){
  const t = now || performance.now();
  const dt = Math.min(40, t - last);
  last = t;

  // clear
  ctx.fillStyle = '#00010a';
  ctx.fillRect(0,0,innerWidth,innerHeight);

  // update background particles (cheap)
  for (let p of bgParticles){
    p.x += p.vx * (dt/16);
    p.y += p.vy * (dt/16);
    // wrap
    if (p.x < -10) p.x = innerWidth + 10;
    if (p.x > innerWidth + 10) p.x = -10;
    if (p.y < -10) p.y = innerHeight + 10;
    if (p.y > innerHeight + 10) p.y = -10;
    // draw small dot (no heavy shadow)
    ctx.beginPath();
    ctx.fillStyle = `rgba(0,180,230,${p.alpha})`;
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
  }

  // update logo particles (they form shapes)
  for (let p of logoParticles){
    if (p.tx !== null && p.ty !== null){
      const dx = p.tx - p.x, dy = p.ty - p.y;
      p.vx += dx * 0.12;
      p.vy += dy * 0.12;
      p.vx *= 0.86; p.vy *= 0.86;
    } else {
      // gentle drift
      const ang = Math.sin((p.x*0.0012 + t*0.0009) * 1.2);
      p.vx += Math.cos(ang) * BASE_SPEED * 0.04;
      p.vy += Math.sin(ang) * BASE_SPEED * 0.04;
      p.vx *= 0.96; p.vy *= 0.96;
    }
    p.x += p.vx * (dt/16);
    p.y += p.vy * (dt/16);
    // wrap
    if (p.x < -10) p.x = innerWidth + 10;
    if (p.x > innerWidth + 10) p.x = -10;
    if (p.y < -10) p.y = innerHeight + 10;
    if (p.y > innerHeight + 10) p.y = -10;

    // draw crisp neon dot (smaller shadow for clarity)
    const baseR = 0, baseG = 210, baseB = 255;
    const r = baseR, g = baseG, b = baseB;
    ctx.beginPath();
    ctx.fillStyle = `rgba(${r},${g},${b},${p.alpha})`;
    ctx.shadowColor = `rgba(${r},${g},${b},${Math.min(0.9, p.alpha * 1.2)})`;
    ctx.shadowBlur = 6; // small blur for neon feel but not heavy
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // subtle vignette
  const vg = ctx.createRadialGradient(innerWidth/2, innerHeight/2, Math.min(innerWidth,innerHeight)*0.2, innerWidth/2, innerHeight/2, Math.max(innerWidth,innerHeight));
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.28)');
  ctx.fillStyle = vg;
  ctx.fillRect(0,0,innerWidth,innerHeight);
}
let raf;
function loop(now){ draw(now); raf = requestAnimationFrame(loop); }

/* ---------- Tween helpers (logo morph) ---------- */
function easeOutCubic(t){ return 1 - Math.pow(1 - t, 3); }
function tweenToTargets(particlesArr, duration){
  return new Promise(resolve => {
    const start = performance.now();
    const from = particlesArr.map(p => ({x:p.x,y:p.y}));
    function step(now){
      const t = Math.min(1, (now - start) / duration);
      const e = easeOutCubic(t);
      for (let i=0;i<particlesArr.length;i++){
        const p = particlesArr[i];
        if (p.tx === null || p.ty === null) continue;
        p.x = from[i].x + (p.tx - from[i].x) * e + (Math.random()-0.5)*0.3*(1-e);
        p.y = from[i].y + (p.ty - from[i].y) * e + (Math.random()-0.5)*0.3*(1-e);
        p.vx *= 0.86; p.vy *= 0.86;
      }
      if (t < 1) requestAnimationFrame(step); else resolve();
    }
    requestAnimationFrame(step);
  });
}

/* ---------- Sequence: scatter -> logo -> 8-ball -> scatter (loop) ---------- */
async function runSequence(){
  while (true){
    // scatter (logoParticles already scattered near left slot)
    clearLogoTargets();
    await wait(1200);

    // gather into logo (left slot)
    const leftRect = document.getElementById('leftSlot').getBoundingClientRect();
    const leftBox = { cx: leftRect.left + leftRect.width/2, cy: leftRect.top + leftRect.height/2, maxW: Math.min(leftRect.width, leftRect.height) * 0.9 };
    const logoPts = sampleLogoPoints(LOGO_PARTICLES * 1.1, leftBox);
    if (logoPts.length >= 8){
      assignLogoTargets(logoPts);
      await tweenToTargets(logoParticles, 900);
      await wait(900);
    }

    // morph to 8-ball on right slot
    const rightRect = document.getElementById('rightSlot').getBoundingClientRect();
    const rightBox = { cx: rightRect.left + rightRect.width/2, cy: rightRect.top + rightRect.height/2, maxW: Math.min(rightRect.width, rightRect.height) * 0.9 };
    const eightPts = generate8BallPoints(LOGO_PARTICLES * 1.0, rightBox);
    assign8BallTargets(eightPts);
    await tweenToTargets(logoParticles, 900);
    await wait(800);

    // disperse back to scatter (logoParticles return to left scattered area)
    clearLogoTargets();
    await tweenToTargets(logoParticles, 900); // gentle disperse
    await wait(700);
  }
}

/* ---------- Start everything ---------- */
function clearLogoTargets(){ for (let p of logoParticles){ p.tx = null; p.ty = null; } }
initAll();
loop();
let started = false;
function tryStart(){
  if (started) return;
  started = true;
  // start sequence after logo loads (or fallback)
  runSequence();
  revealUI();
}
logoImg.onload = tryStart;
setTimeout(tryStart, 900);

/* ---------- Intro reveal (centered logo -> top) ---------- */
async function revealUI(){
  const introEl = document.getElementById('intro');
  if (introEl.dataset.revealed) return;
  introEl.dataset.revealed = '1';
  const introLogoEl = document.getElementById('introLogo');
  const topRect = document.getElementById('topLogo').getBoundingClientRect();
  const introRect = introLogoEl.getBoundingClientRect();
  await wait(700);
  const scale = Math.max(0.28, topRect.width / introRect.width);
  const translateX = (topRect.left + topRect.width/2) - (introRect.left + introRect.width/2);
  const translateY = (topRect.top + topRect.height/2) - (introRect.top + introRect.height/2);
  introLogoEl.style.transition = `transform 520ms var(--ease), opacity 520ms var(--ease)`;
  introLogoEl.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
  introLogoEl.style.opacity = '0.98';
  await wait(560);
  introEl.style.transition = 'opacity 220ms var(--ease), visibility 220ms var(--ease)';
  introEl.style.opacity = '0';
  introEl.style.visibility = 'hidden';
  document.getElementById('topLogoWrap').classList.add('visible');
  document.getElementById('sampleCard').classList.add('visible');
  document.getElementById('mainCard').classList.add('visible');
  document.getElementById('site-footer').classList.add('visible');
}

/* ---------- Expose debug helpers ---------- */
window._mtm = {
  initAll,
  sampleLogoPoints,
  generate8BallPoints,
  logoParticles,
  bgParticles
};
</script>
</body>
</html>
