<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MTM Analytics</title>
  <meta name="description" content="MTM Analytics — reports coming soon" />

  <style>
    :root{
      --bg1:#0f1724;
      --bg2:#0b3b8a;
      --glass: rgba(255,255,255,0.06);
      --glass-2: rgba(255,255,255,0.08);
      --accent: #4fc3f7;
      --card-bg: rgba(255,255,255,0.06);
      --text: #e6f0fb;
      --muted: rgba(230,240,251,0.7);
      --radius: 14px;
      --ease: cubic-bezier(.2,.9,.3,1);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      background: radial-gradient(1200px 600px at 10% 10%, rgba(79,195,247,0.08), transparent 10%),
                  linear-gradient(180deg,var(--bg1),var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      overflow:hidden;
    }

    .bg-shape{
      position:fixed;
      inset: -20% -20% auto auto;
      width:60vmax;
      height:60vmax;
      background: linear-gradient(135deg, rgba(79,195,247,0.08), rgba(10,25,60,0.12));
      filter: blur(60px);
      transform: rotate(15deg);
      pointer-events:none;
      animation: float 18s linear infinite;
      opacity:0.9;
    }
    .bg-shape.alt{
      right:auto; left:-10%;
      top:auto; bottom:-10%;
      transform: rotate(-10deg);
      animation-duration: 26s;
      opacity:0.7;
    }
    @keyframes float{
      0%{transform: translateY(0) rotate(0deg)}
      50%{transform: translateY(-30px) rotate(6deg)}
      100%{transform: translateY(0) rotate(0deg)}
    }

    .intro {
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background: linear-gradient(180deg, rgba(5,10,20,0.6), rgba(5,10,20,0.2));
      z-index:40;
      transition: opacity 700ms var(--ease), visibility 700ms var(--ease);
    }
    .intro.hidden{ opacity:0; visibility:hidden; pointer-events:none; }
    .intro img{ width:28vmin; max-width:220px; animation: pop 900ms var(--ease) forwards; }
    @keyframes pop{
      0%{transform: scale(.6); opacity:0}
      60%{transform: scale(1.06); opacity:1}
      100%{transform: scale(1); opacity:1}
    }

    .page {
      width:100%;
      max-width:1100px;
      padding:48px;
      display:flex;
      flex-direction:column;
      gap:28px;
      z-index:10;
    }

    header {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:16px;
      padding-top:6px;
    }
    .logo-top{
      display:flex;
      align-items:center;
      gap:12px;
      position:relative;
      top:0;
      transition: transform 500ms var(--ease);
    }
    .logo-top img{ height:44px; width:auto; display:block; }

    .card-wrap{
      display:flex;
      align-items:center;
      justify-content:center;
      margin-top:28px;
    }
    .card{
      width:100%;
      max-width:720px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      border-radius: var(--radius);
      padding:28px;
      box-shadow: 0 8px 30px rgba(2,6,23,0.6);
      backdrop-filter: blur(10px) saturate(120%);
      border: 1px solid rgba(255,255,255,0.04);
      display:flex;
      gap:20px;
      align-items:center;
    }
    .card .preview{
      width:160px;
      height:100px;
      border-radius:10px;
      background: linear-gradient(135deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      border: 1px dashed rgba(255,255,255,0.06);
    }
    .card .preview img{ max-width:90%; max-height:90%; opacity:0.95; }

    .card .meta{
      flex:1;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .card h2{ margin:0; font-size:1.25rem; letter-spacing: -0.01em; }
    .card p{ margin:0; color:var(--muted); font-size:0.95rem; }

    .coming-soon{
      display:inline-block;
      margin-top:10px;
      padding:8px 12px;
      background: linear-gradient(90deg, rgba(79,195,247,0.12), rgba(79,195,247,0.06));
      color:var(--accent);
      border-radius:999px;
      font-weight:600;
      font-size:0.9rem;
      border: 1px solid rgba(79,195,247,0.08);
      width:fit-content;
    }

    @media (max-width:720px){
      .card{ flex-direction:column; align-items:flex-start; padding:18px; gap:12px; }
      .card .preview{ width:100%; height:160px; }
      .logo-top img{ height:36px; }
      .intro img{ width:40vmin; max-width:160px; }
    }
  </style>
</head>
<body>

  <div class="bg-shape" aria-hidden="true"></div>
  <div class="bg-shape alt" aria-hidden="true"></div>

  <div id="intro" class="intro" role="dialog" aria-label="Intro animation">
    <img src="assets/logo.png" alt="MTM Analytics logo" id="introLogo">
  </div>

  <main class="page" role="main" aria-labelledby="siteTitle">
    <header>
      <div class="logo-top" id="topLogoWrap">
        <img src="assets/logo.png" alt="MTM Analytics" id="topLogo">
      </div>
    </header>

    <section class="card-wrap" aria-labelledby="cardTitle">
      <article class="card" role="article" aria-labelledby="cardTitle" aria-describedby="cardDesc">
        <div class="preview" aria-hidden="true">
          <img src="assets/logo.png" alt="Logo placeholder">
        </div>

        <div class="meta">
          <h2 id="cardTitle">Report Dashboard</h2>
          <p id="cardDesc">Interactive reports will appear here. For now, the report embed is coming soon. When ready, this card will link to the full report.</p>
          <span class="coming-soon">Coming soon</span>
        </div>
      </article>
    </section>
  </main>

  <script>
    (function(){
      const intro = document.getElementById('intro');
      const topLogoWrap = document.getElementById('topLogoWrap');

      const showMs = 1600;
      const fadeMs = 700;

      setTimeout(() => {
        intro.classList.add('hidden');
        topLogoWrap.style.transform = 'translateY(-6px)';
        setTimeout(()=> topLogoWrap.style.transform = 'translateY(0)', 600);
      }, showMs);

      window.addEventListener('keydown', (e) => {
        if(e.key === 'Escape'){
          intro.classList.add('hidden');
        }
      });
    })();
  </script>
</body>
</html>
