<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MTM Analytics — Coming Soon</title>
  <meta name="description" content="MTM Analytics — actionable insights and analytics for businesses. Join the waitlist to be first to know when we launch." />
  <meta property="og:title" content="MTM Analytics — Coming Soon" />
  <meta property="og:description" content="Sign up to be first to know when we launch." />
  <meta property="og:image" content="/assets/og-image.png" />
  <meta name="theme-color" content="#071033" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#071033;
      --card:#071a3a;
      --accent:#0ea5ff;
      --muted:#9fb3d6;
      --glass: rgba(255,255,255,0.03);
      --radius:14px;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
      color-scheme: dark;
    }
    html,body{height:100%;margin:0;background:linear-gradient(180deg,#04102a 0%, #071033 60%);color:#e6f0ff}
    .page{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:48px 20px;
      box-sizing:border-box;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(14,165,255,0.04) 0 2px, transparent 2px),
        radial-gradient(circle at 80% 70%, rgba(14,165,255,0.03) 0 2px, transparent 2px);
      background-repeat: no-repeat;
    }
    .container{
      width:100%;
      max-width:980px;
      display:grid;
      grid-template-columns: 1fr 420px;
      gap:32px;
      align-items:center;
    }
    @media (max-width:880px){
      .container{grid-template-columns:1fr; padding:0 8px}
    }
    .brand{
      padding:28px;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:var(--radius);
      box-shadow: 0 6px 30px rgba(2,6,23,0.6);
      border:1px solid rgba(255,255,255,0.03);
    }
    .logo{
      display:flex;
      align-items:center;
      gap:18px;
    }
    .mark{
      width:72px;height:72px;border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#06203a,#0b3a6a);
      box-shadow: 0 6px 18px rgba(14,165,255,0.06), inset 0 -6px 18px rgba(0,0,0,0.25);
      border:1px solid rgba(255,255,255,0.04);
    }
    .mark svg{width:44px;height:44px;display:block}
    h1{font-size:28px;margin:6px 0 0 0;letter-spacing:0.2px}
    p.lead{color:var(--muted);margin:14px 0 0 0;line-height:1.5}
    .meta{
      margin-top:22px;
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:12px;
    }
    @media (max-width:880px){ .meta{align-items:center;text-align:center} }
    .cta{
      display:inline-flex;
      align-items:center;
      gap:10px;
      background:var(--accent);
      color:#012;
      padding:10px 16px;
      border-radius:10px;
      font-weight:700;
      text-decoration:none;
      border:none;
      cursor:pointer;
      box-shadow: 0 6px 18px rgba(14,165,255,0.12);
    }
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:12px;
      padding:22px;
      border:1px solid rgba(255,255,255,0.03);
      box-shadow: 0 10px 40px rgba(2,6,23,0.6);
    }
    .preview{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:16px;
      flex-direction:column;
    }
    .coming{
      font-size:18px;
      color:#dff6ff;
      background:linear-gradient(90deg, rgba(14,165,255,0.08), rgba(14,165,255,0.03));
      padding:8px 14px;border-radius:10px;border:1px solid rgba(14,165,255,0.06);
    }
    form { display:flex; gap:8px; width:100%; max-width:420px; }
    input[type="email"]{
      flex:1;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);
      background:rgba(255,255,255,0.02);color:inherit;font-size:15px;
    }
    button[type="submit"]{ padding:10px 14px;border-radius:10px;border:none;background:var(--accent);color:#012;font-weight:700;cursor:pointer }
    .muted{color:var(--muted);font-size:13px;margin-top:8px}
    .footer{margin-top:18px;color:var(--muted);font-size:13px}
    /* small decorative hex grid */
    .hex {
      position:absolute; inset:0; pointer-events:none; opacity:0.06; mix-blend-mode:screen;
      background-image: radial-gradient(circle at 10% 20%, rgba(255,255,255,0.02) 0 1px, transparent 1px);
    }
    /* focus states */
    a:focus, button:focus, input:focus { outline:3px solid rgba(14,165,255,0.12); outline-offset:3px; }
  </style>
</head>
<body>
  <div class="page" role="main">
    <div class="container" aria-live="polite">
      <div class="brand card" aria-labelledby="brand-heading">
        <div class="logo">
          <div class="mark" aria-hidden="true">
            <!-- Simple geometric mark -->
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect x="6" y="6" width="52" height="52" rx="10" fill="url(#g)"/>
              <path d="M18 44 L30 20 L46 44" stroke="#e6f0ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              <defs><linearGradient id="g" x1="0" x2="1"><stop offset="0" stop-color="#06203a"/><stop offset="1" stop-color="#0b3a6a"/></linearGradient></defs>
            </svg>
          </div>
          <div>
            <h1 id="brand-heading">MTM ANALYTICS</h1>
            <p class="lead">Actionable analytics for smarter decisions. Launching soon.</p>
          </div>
        </div>

        <div class="meta" role="region" aria-label="Launch status">
          <div class="coming" aria-hidden="false">Coming soon</div>

          <!-- Netlify form for waitlist -->
          <form name="waitlist" method="POST" data-netlify="true" netlify-honeypot="bot-field" aria-label="Join the waitlist">
            <input type="hidden" name="form-name" value="waitlist" />
            <input type="email" name="email" placeholder="Your email" aria-label="Email address" required />
            <button type="submit" class="cta">Join waitlist</button>
          </form>

          <div class="muted">We’ll email you when we launch. No spam. Unsubscribe anytime.</div>
          <div class="footer">© <span id="year"></span> MTM Analytics</div>
        </div>
      </div>

      <aside class="card preview" aria-hidden="true">
        <!-- Visual preview or hero image placeholder -->
        <div style="width:100%;max-width:360px;height:220px;border-radius:10px;background:
                    linear-gradient(180deg,#06203a,#0b2b55);
                    display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.85);font-weight:700;">
          mtmanalytics.co.uk
        </div>
        <div style="color:var(--muted);font-size:13px;text-align:center;max-width:360px">
          Built on Netlify · Secure with HTTPS · Fast global CDN
        </div>
      </aside>
    </div>
  </div>

  <script>
    // Small UX helpers
    document.getElementById('year').textContent = new Date().getFullYear();

    // Netlify form success handling (progressive enhancement)
    (function(){
      const form = document.querySelector('form[name="waitlist"]');
      if(!form) return;
      form.addEventListener('submit', function(e){
        // Let Netlify handle the POST; show a quick inline message
        setTimeout(()=> {
          try {
            form.innerHTML = '<div style="padding:18px;border-radius:10px;background:rgba(14,165,255,0.06);color:#dff6ff">Thanks — you are on the list. We will email you when we launch.</div>';
          } catch(e){}
        }, 300);
      });
    })();
  </script>

  <!-- Analytics placeholder: replace with your measurement ID or remove if not used -->
  <script>
    /* Google Analytics 4 minimal snippet - replace YOUR_GA_MEASUREMENT_ID */
    (function(){
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'YOUR_GA_MEASUREMENT_ID', { 'send_page_view': true });
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=YOUR_GA_MEASUREMENT_ID';
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
