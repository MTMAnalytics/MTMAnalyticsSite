<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MTM Analytics</title>
  <meta name="description" content="MTM Analytics — coming soon" />
  <style>
    :root{
      --bg-dark:#02102a;
      --bg-mid:#042a66;
      --neon: rgba(64,200,255,0.98);
      --muted: rgba(230,240,251,0.72);
      --card-blue: rgba(10,36,80,0.55);
      --radius: 16px;
      --ease: cubic-bezier(.2,.9,.3,1);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
      color:#eaf6ff;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      min-height:100vh;
      padding:48px 20px;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      background:
        linear-gradient(180deg, rgba(0,8,24,0.72), rgba(2,12,36,0.6));
      overflow-x:hidden;
    }

    /* High-res textured backdrop (place your texture at assets/bg-texture.jpg) */
    .backdrop {
      position:fixed;
      inset:0;
      background-image:
        url('assets/bg-texture.jpg'),
        radial-gradient(1200px 600px at 10% 10%, rgba(64,200,255,0.03), transparent 8%),
        linear-gradient(180deg,var(--bg-dark),var(--bg-mid));
      background-size:cover, cover, cover;
      background-position:center center, left top, center;
      filter: saturate(110%) contrast(105%);
      opacity:0.95;
      z-index:0;
      pointer-events:none;
    }

    /* subtle grain overlay to avoid banding */
    .grain {
      position:fixed;
      inset:0;
      background-image: radial-gradient(rgba(255,255,255,0.01) 1px, transparent 1px);
      background-size: 3px 3px;
      mix-blend-mode: overlay;
      opacity:0.25;
      z-index:1;
      pointer-events:none;
    }

    /* Intro overlay: only the big logo visible */
    .intro {
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:60;
      transition: opacity 900ms var(--ease), visibility 900ms var(--ease);
      background: linear-gradient(180deg, rgba(0,6,18,0.75), rgba(0,6,18,0.12));
    }
    .intro.hidden{ opacity:0; visibility:hidden; pointer-events:none; }

    /* Intro logo - very large and centered */
    .intro .logo {
      width:56vmin;
      max-width:820px;
      max-height:78vh;
      height:auto;
      display:block;
      transform-origin:center;
      filter: drop-shadow(0 40px 120px rgba(0,0,0,0.75));
      will-change: transform, opacity;
    }

    /* container for final layout */
    .container{
      width:100%;
      max-width:980px;
      z-index:10;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:28px;
      pointer-events:auto;
    }

    /* Top centered small logo (final position) */
    .top-logo {
      margin-top:6vh;
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      opacity:0;
      transform: translateY(-6px) scale(0.98);
      transition: opacity 700ms var(--ease), transform 700ms var(--ease);
      pointer-events:none;
      z-index:20;
    }
    .top-logo.visible{ opacity:1; transform: translateY(0) scale(1); }
    .top-logo img{
      height:48px;
      width:auto;
      display:block;
      filter: drop-shadow(0 8px 30px rgba(0,0,0,0.6));
    }

    /* Main card - glass, centered, neon rim */
    .card {
      width:100%;
      max-width:520px;
      margin-top:18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius: var(--radius);
      padding:28px 22px;
      box-shadow:
        0 18px 60px rgba(2,6,23,0.6),
        0 0 40px rgba(64,200,255,0.06);
      backdrop-filter: blur(14px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.03);
      display:flex;
      flex-direction:column;
      gap:18px;
      align-items:center;
      position:relative;
      z-index:5;
      transition: transform 700ms var(--ease), opacity 700ms var(--ease);
      opacity:0;
      transform: translateY(10px) scale(0.995);
    }

    /* stronger neon rim/shadow */
    .card::after{
      content:"";
      position:absolute;
      inset:-6px;
      border-radius:calc(var(--radius) + 6px);
      background: radial-gradient(ellipse at center, rgba(64,200,255,0.12), transparent 35%);
      filter: blur(18px);
      z-index:-1;
      pointer-events:none;
      mix-blend-mode:screen;
    }

    .card.visible{ opacity:1; transform: translateY(0) scale(1); }

    /* Preview area: centered logo inside card */
    .preview {
      width:240px;
      height:160px;
      border-radius:12px;
      background: linear-gradient(135deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow: 0 10px 30px rgba(2,6,23,0.5), 0 0 26px rgba(64,200,255,0.06) inset;
      margin:0 auto;
    }
    .preview img{ max-width:86%; max-height:86%; opacity:0.98; display:block; }

    /* Meta area simplified: only centered Coming soon */
    .meta {
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:center;
      text-align:center;
      width:100%;
    }

    .meta .coming {
      display:block;
      margin-top:6px;
      padding:12px 22px;
      background: linear-gradient(90deg, rgba(64,200,255,0.16), rgba(64,200,255,0.08));
      color:var(--neon);
      border-radius:999px;
      font-weight:800;
      letter-spacing:0.02em;
      border: 1px solid rgba(64,200,255,0.12);
      box-shadow: 0 18px 60px rgba(64,200,255,0.08);
      cursor:default;
      font-size:1rem;
    }

    /* small caption under button (optional, empty by default) */
    .meta .caption{
      color:var(--muted);
      font-size:0.95rem;
      opacity:0.9;
    }

    @media (max-width:720px){
      body{ padding:28px 16px; }
      .intro .logo{ width:72vmin; max-width:420px; }
      .top-logo img{ height:40px; }
      .card{ padding:20px; gap:14px; max-width:92%; }
      .preview{ width:100%; height:160px; }
    }
  </style>
</head>
<body>

  <div class="backdrop" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <!-- Intro overlay: only the big logo is visible here -->
  <div id="intro" class="intro" role="dialog" aria-label="Intro animation">
    <img src="assets/logo.png" alt="MTM Analytics logo" class="logo" id="introLogo">
  </div>

  <div class="container" role="main" aria-labelledby="siteTitle">
    <!-- Top centered small logo (final position after intro animation) -->
    <div class="top-logo" id="topLogoWrap" aria-hidden="false">
      <img src="assets/logo.png" alt="MTM Analytics" id="topLogo">
    </div>

    <!-- Main card: centered logo preview + coming soon button (centered) -->
    <section class="card" id="mainCard" aria-labelledby="cardTitle" aria-describedby="cardDesc">
      <div class="preview" aria-hidden="true">
        <img src="assets/logo.png" alt="Logo placeholder">
      </div>

      <div class="meta">
        <span class="coming" role="status" aria-live="polite">Coming soon</span>
        <div class="caption" id="cardDesc"></div>
      </div>
    </section>
  </div>

  <script>
    (function(){
      const intro = document.getElementById('intro');
      const introLogo = document.getElementById('introLogo');
      const topLogoWrap = document.getElementById('topLogoWrap');
      const topLogo = document.getElementById('topLogo');
      const mainCard = document.getElementById('mainCard');

      const SHOW_MS = 3000;      // how long the big intro logo stays visible
      const TRANSITION_MS = 900; // animation duration for moving/fading

      // Smoothly animate the intro logo to the exact position/size of the top logo
      function animateLogoToTop() {
        // get bounding rects
        const introRect = introLogo.getBoundingClientRect();
        const topRect = topLogo.getBoundingClientRect();

        // compute scale and translation to move introLogo to topLogo position
        const scale = topRect.width / introRect.width;
        const translateX = (topRect.left + topRect.width/2) - (introRect.left + introRect.width/2);
        const translateY = (topRect.top + topRect.height/2) - (introRect.top + introRect.height/2);

        // apply transform with transition for a seamless morph
        introLogo.style.transition = `transform ${TRANSITION_MS}ms var(--ease), opacity ${TRANSITION_MS}ms var(--ease)`;
        introLogo.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
        introLogo.style.opacity = '0.98';

        // after transform completes, hide intro and reveal final UI
        setTimeout(() => {
          intro.classList.add('hidden');
          topLogoWrap.classList.add('visible');
          setTimeout(()=> mainCard.classList.add('visible'), 160);
        }, TRANSITION_MS);
      }

      // Start sequence
      function startSequence() {
        // ensure images are loaded so measurements are correct
        if (!introLogo.complete || !topLogo.complete) {
          // wait a short bit for images to load
          setTimeout(startSequence, 120);
          return;
        }
        // keep the big logo visible for SHOW_MS, then animate
        setTimeout(animateLogoToTop, SHOW_MS);
      }

      // Accessibility: skip animation
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          intro.classList.add('hidden');
          topLogoWrap.classList.add('visible');
          mainCard.classList.add('visible');
        }
      });
      intro.addEventListener('click', () => {
        intro.classList.add('hidden');
        topLogoWrap.classList.add('visible');
        mainCard.classList.add('visible');
      });

      // Kick off when DOM ready
      if (document.readyState === 'complete' || document.readyState === 'interactive') {
        setTimeout(startSequence, 120);
      } else {
        window.addEventListener('DOMContentLoaded', () => setTimeout(startSequence, 120));
      }

      // Fallback: if something blocks the animation, ensure final UI appears
      setTimeout(() => {
        if (!topLogoWrap.classList.contains('visible') && intro.classList.contains('hidden')) {
          topLogoWrap.classList.add('visible');
          mainCard.classList.add('visible');
        }
      }, SHOW_MS + TRANSITION_MS + 3000);
    })();
  </script>
</body>
</html>
